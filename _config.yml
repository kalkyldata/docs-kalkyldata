title: Kalkyldata Docs
description: Dokumentation för Kalkyldata
theme: just-the-docs

url: "https://kalkyldata.github.io"
baseurl: "/docs-kalkyldata"

nav_sort: case_insensitive
nav_external_links_new_tab: true

# Keep navigation expanded in the sidebar by default
nav_expand: true

defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"

plugins:
  - jekyll-sitemap
       
aux_links:
  Template Repository: https://github.com/just-the-docs/just-the-docs-template
